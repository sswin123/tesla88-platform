services:
  website:
    build: .
    restart: always
    env_file:
      - .env
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-member_bot}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      MEMBER_JWT_SECRET: ${MEMBER_JWT_SECRET}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      UPLOAD_DIR: /data/uploads
    volumes:
      - website_uploads:/data/uploads
    networks:
      - sswin88
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  website_uploads:

networks:
  sswin88:
    name: sswin88
