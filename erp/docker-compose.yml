services:
  erp:
    build: .
    restart: always
    env_file:
      - .env
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      NODE_ENV: production
      BOT_RELAY_URL: ${BOT_RELAY_URL}
      BOT_RELAY_AUTH_TOKEN: ${BOT_RELAY_AUTH_TOKEN}
      WEBSITE_URL: ${WEBSITE_URL:-http://website:3000}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      BACKUP_DIR: /backups
    volumes:
      - erp_backups:/backups
    networks:
      - sswin88
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health/system || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  erp_backups:

networks:
  sswin88:
    name: sswin88
