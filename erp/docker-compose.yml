services:
  erp:
    build: .
    restart: always
    env_file:
      - .env
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      NODE_ENV: production
      BOT_RELAY_URL: ${BOT_RELAY_URL}
      BOT_RELAY_AUTH_TOKEN: ${BOT_RELAY_AUTH_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/login || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
