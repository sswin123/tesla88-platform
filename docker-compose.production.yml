# Production Docker Compose — apidemo.club
# Domains: apidemo.club (website) | api.apidemo.club (ERP API) | erp.apidemo.club (ERP admin)
# Server:  45.77.169.133 (Vultr Ubuntu 24.04)
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d
#   docker compose -f docker-compose.production.yml logs -f
#   docker compose -f docker-compose.production.yml ps

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # database.sql 不再作为 initdb 脚本使用；
      # 所有 Schema 由 erp/migrations/000_base_schema.sql 开始的编号迁移链处理
    networks:
      - sswin88
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Redis (session cache, rate limiting) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - sswin88
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── SSL 证书生成（一次性，若 nginx_ssl volume 已有证书则跳过） ─────────────
  certgen:
    image: alpine
    volumes:
      - nginx_ssl:/ssl
      - ./scripts/nginx-entrypoint.sh:/certgen.sh:ro
    command: ["sh", "/certgen.sh"]
    restart: "no"

  # ── Database Migrations (一次性，其他服务在此完成后才启动) ───────────────────
  migrate:
    image: postgres:14-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./erp/migrations:/migrations:ro
      - ./scripts/docker-migrate.sh:/docker-migrate.sh:ro
    command: ["sh", "/docker-migrate.sh"]
    networks:
      - sswin88
    restart: "no"

  # ── ERP Admin Panel ────────────────────────────────────────────────────────
  erp:
    build:
      context: ./erp
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV:            production
      HOSTNAME:            "0.0.0.0"
      DATABASE_URL:        postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET:          ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN:  ${BOT_TOKEN}
      BOT_RELAY_URL:       http://telegram-bot:8090
      BOT_RELAY_AUTH_TOKEN: ${BOT_RELAY_AUTH_TOKEN}
      WEBSITE_URL:         ${SITE_URL}
      APP_VERSION:         ${APP_VERSION:-1.0.0}
      BACKUP_DIR:          /backups
      MEDIA_UPLOAD_DIR:    /uploads/media
      # ── Enterprise Gaming Platform ────────────────────────────────────────
      # AES-256-GCM key (32 bytes as 64 hex chars) for gp_credentials encryption
      AES_ENCRYPTION_KEY:        ${AES_ENCRYPTION_KEY}
      # System admin ID used as operator for automated game callbacks (default=1)
      GAME_SYSTEM_ADMIN_ID:      ${GAME_SYSTEM_ADMIN_ID:-1}
      # Gaming platform feature flags
      ENABLE_PROVIDER_DEBUG:     ${ENABLE_PROVIDER_DEBUG:-false}
      CALLBACK_DEBUG:            ${CALLBACK_DEBUG:-false}
      RETRY_ENABLED:             ${RETRY_ENABLED:-true}
      IDEMPOTENCY_ENABLED:       ${IDEMPOTENCY_ENABLED:-true}
      # 启用 Node.js 警告追踪（内存 / 废弃 API），输出到 stderr 被 startup-hooks 捕获
      NODE_OPTIONS:        "--trace-warnings"
    volumes:
      - erp_backups:/backups
      - erp_uploads:/uploads/media
    networks:
      - sswin88
    healthcheck:
      # 保留完整 wget 输出（stderr + stdout），失败时可通过 docker inspect 查看
      test: ["CMD-SHELL", "out=$(wget -O /dev/null --server-response --timeout=5 http://127.0.0.1:3000/api/ping 2>&1); code=$?; echo \"[healthcheck] $(date -Iseconds) exit=$code $out\"; exit $code"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Website Member Portal ──────────────────────────────────────────────────
  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV:             production
      HOSTNAME:             "0.0.0.0"
      DB_HOST:              postgres
      DB_PORT:              5432
      DB_NAME:              ${POSTGRES_DB}
      DB_USER:              ${POSTGRES_USER}
      DB_PASSWORD:          ${POSTGRES_PASSWORD}
      MEMBER_JWT_SECRET:    ${MEMBER_JWT_SECRET}
      BOT_RELAY_AUTH_TOKEN: ${BOT_RELAY_AUTH_TOKEN}
      ERP_INTERNAL_URL:     http://erp:3000
      APP_VERSION:          ${APP_VERSION:-1.0.0}
      UPLOAD_DIR:           /data/uploads
      ERP_MEDIA_DIR:        /uploads/media
    volumes:
      - website_uploads:/data/uploads
      - erp_uploads:/uploads/media:ro
    networks:
      - sswin88
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --timeout=5 http://127.0.0.1:3000/api/ping 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Telegram Bot + Relay ───────────────────────────────────────────────────
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      BOT_TOKEN:             ${BOT_TOKEN}
      SUPER_ADMIN_ID:        ${SUPER_ADMIN_ID}
      POSTGRES_HOST:         postgres
      POSTGRES_PORT:         5432
      POSTGRES_DB:           ${POSTGRES_DB}
      POSTGRES_USER:         ${POSTGRES_USER}
      POSTGRES_PASSWORD:     ${POSTGRES_PASSWORD}
      JWT_SECRET:            ${JWT_SECRET}
      MEMBER_JWT_SECRET:     ${MEMBER_JWT_SECRET}
      CS_USERNAME:           ${CS_USERNAME}
      ACCOUNT_CHANGE_COOLDOWN_HOURS: ${ACCOUNT_CHANGE_COOLDOWN_HOURS:-24}
      ADMIN_CHAT_ID:         ${ADMIN_CHAT_ID}
      SUPPORT_CHAT_ID:       ${SUPPORT_CHAT_ID}
      BOT_RELAY_AUTH_TOKEN:  ${BOT_RELAY_AUTH_TOKEN}
      BOT_RELAY_PORT:        8090
      MIN_DEPOSIT_AMOUNT:    ${MIN_DEPOSIT_AMOUNT:-30}
      MIN_WITHDRAWAL_AMOUNT: ${MIN_WITHDRAWAL_AMOUNT:-50}
      ERP_URL:               http://erp:3000
      WEBSITE_URL:           http://website:3000
    ports:
      - "8090:8090"
    networks:
      - sswin88
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/ping', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      website:
        condition: service_healthy
      erp:
        condition: service_healthy
      certgen:
        condition: service_completed_successfully
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_ssl:/etc/nginx/ssl:ro         # 由 certgen 服务写入，nginx 只读
      - nginx_logs:/var/log/nginx
    networks:
      - sswin88
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  erp_backups:
  erp_uploads:
  website_uploads:
  nginx_ssl:
  nginx_logs:

networks:
  sswin88:
    name: sswin88
    driver: bridge
